<div class="intersection-wrapper">
  <svg viewBox="0 0 800 800" class="intersection-svg">

    <!-- Background -->
    <rect x="0" y="0" width="800" height="800" fill="#f3f3f3"></rect>

    <!-- Vertical road -->
    <rect
      x="330"
      y="60"
      width="140"
      height="680"
      [attr.fill]="isNsActive() ? '#b7f0c1' : '#d9d9d9'">
    </rect>

    <!-- Horizontal road -->
    <rect
      x="60"
      y="330"
      width="680"
      height="140"
      [attr.fill]="isEwActive() ? '#b7f0c1' : '#d9d9d9'">
    </rect>

    <!-- Dashed center lines -->
    <line x1="400" y1="80" x2="400" y2="720" stroke="#444" stroke-dasharray="10,10" stroke-width="4"></line>
    <line x1="80" y1="400" x2="720" y2="400" stroke="#444" stroke-dasharray="10,10" stroke-width="4"></line>

    <!-- Labels -->
    <text x="400" y="40" text-anchor="middle" class="road-label">North</text>
    <text x="400" y="780" text-anchor="middle" class="road-label">South</text>
    <text x="40" y="410" text-anchor="middle" class="road-label">West</text>
    <text x="760" y="410" text-anchor="middle" class="road-label">East</text>

    <!-- North queue -->
    <g *ngFor="let vehicle of northVehicles; let i = index">
      <rect
        [attr.x]="340"
        [attr.y]="240 - i * 84"
        width="44"
        height="72"
        rx="8"
        class="vehicle">
      </rect>
      <text
        [attr.x]="360"
        [attr.y]="282 - i * 84"
        text-anchor="middle"
        class="vehicle-text">
        {{ shortVehicleId(vehicle.vehicleId) }} | {{ turnLabel(vehicle.turn) }}
      </text>
    </g>

    <!-- South queue -->
    <g *ngFor="let vehicle of southVehicles; let i = index">
      <rect
        [attr.x]="413"
        [attr.y]="488 + i * 84"
        width="44"
        height="72"
        rx="8"
        class="vehicle">
      </rect>
      <text
        [attr.x]="435"
        [attr.y]="530 + i * 84"
        text-anchor="middle"
        class="vehicle-text">
        {{ shortVehicleId(vehicle.vehicleId) }} | {{ turnLabel(vehicle.turn) }}
      </text>
    </g>

    <!-- West queue -->
    <g *ngFor="let vehicle of westVehicles; let i = index">
      <rect
        [attr.x]="248 - i * 84"
        [attr.y]="414"
        width="72"
        height="44"
        rx="8"
        class="vehicle">
      </rect>
      <text
        [attr.x]="284 - i * 84"
        [attr.y]="441"
        text-anchor="middle"
        class="vehicle-text">
        {{ shortVehicleId(vehicle.vehicleId) }} | {{ turnLabel(vehicle.turn) }}
      </text>
    </g>

    <!-- East queue -->
    <g *ngFor="let vehicle of eastVehicles; let i = index">
      <rect
        [attr.x]="480 + i * 84"
        [attr.y]="342"
        width="72"
        height="44"
        rx="8"
        class="vehicle">
      </rect>
      <text
        [attr.x]="516 + i * 84"
        [attr.y]="369"
        text-anchor="middle"
        class="vehicle-text">
        {{ shortVehicleId(vehicle.vehicleId) }} | {{ turnLabel(vehicle.turn) }}
      </text>
    </g>

  </svg>
</div>
